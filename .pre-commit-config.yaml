repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']  # Allow Home Assistant specific YAML tags
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-json
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        additional_dependencies: [flake8-docstrings, flake8-bugbear]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, types-requests]
        exclude: ^(tests/|.*_test\.py$)

  - repo: https://github.com/pycqa/pylint
    rev: v3.0.3
    hooks:
      - id: pylint
        args: ["--rcfile=pyproject.toml"]
        additional_dependencies: [homeassistant, voluptuous, pyyaml]

  - repo: local
    hooks:
      - id: yamllint-claude-only
        name: yamllint (Claude-generated files only)
        entry: .claude-code/hooks/yamllint-claude-only.sh
        language: script
        files: \.(yaml|yml)$

      - id: block-mqtt-bridge-secret
        name: block real MQTT bridge password
        # Backstop for the TeslaMate MQTT bridge: the real remote_password must
        # live only in /share/mosquitto/teslamate-bridge.conf on the HA host,
        # never in git. Reject any staged change that adds a remote_password
        # line whose value is not the CHANGE_ME placeholder (catches `git add -f`
        # of the ignored file, or a password pasted into any other file).
        entry: bash -c 'git diff --cached -U0 | grep -E "^\+\s*remote_password" | grep -qv "CHANGE_ME" && { echo "ERROR: a real remote_password is staged — it belongs only in /share/mosquitto/teslamate-bridge.conf on the HA host, not in git."; exit 1; } || true'
        language: system
        pass_filenames: false

  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        additional_dependencies: [tomli]

# Note: HA-specific validation hooks can be added here if needed
# They require proper HA environment setup
