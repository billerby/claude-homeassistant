# =============================================================================
# Jean-Luc — Renault 5 E-Tech telemetry & analytics
# =============================================================================
# TeslaMate-style derived data built on top of the core Renault integration.
#
# Source entities (provided by integration `renault`):
#   sensor.jean_luc_battery                  SoC %
#   sensor.jean_luc_battery_autonomy         Estimated range, km
#   sensor.jean_luc_battery_available_energy Usable energy, kWh
#   sensor.jean_luc_battery_temperature      °C
#   sensor.jean_luc_outside_temperature      °C
#   sensor.jean_luc_mileage                  Odometer, km
#   sensor.jean_luc_charge_state             API state string
#   sensor.jean_luc_charging_mode
#   sensor.jean_luc_admissible_charging_power kW
#   sensor.jean_luc_charging_remaining_time  minutes
#   sensor.jean_luc_plug_state
#   sensor.jean_luc_hvac_soc_threshold
#   binary_sensor.jean_luc_charging          on/off
#   binary_sensor.jean_luc_plug              on/off
#   binary_sensor.jean_luc_hvac              on/off
#   device_tracker.jean_luc_location         GPS
#
# Renault's Kamereon API is poll-based and only reports when the car wakes up,
# so derived sessions/trips are reconstructed from snapshot deltas rather than
# continuous telemetry. Short trips may be smeared by polling gaps.
# =============================================================================

# --- Phase 2 & 3: helpers ----------------------------------------------------
# Persistent state for the in-progress charging session and trip. Updated by
# automations on lifecycle transitions; frozen and read by trigger sensors.
input_boolean:
  jean_luc_trip_in_progress:
    name: Jean-Luc trip in progress

input_datetime:
  jean_luc_session_started_at:
    name: Jean-Luc session started at
    has_date: true
    has_time: true
  jean_luc_trip_started_at:
    name: Jean-Luc trip started at
    has_date: true
    has_time: true

input_number:
  # --- Battery capacity (used for computed charging power) ---
  # The Renault Kamereon API doesn't expose admissible_charging_power or
  # battery_available_energy for the Renault 5 E-Tech, so we synthesise
  # instantaneous charging power from the SoC derivative × usable capacity.
  # Defaults to 40 kWh (Urban Range). Set to 52 if you have the Comfort
  # Range variant.
  jean_luc_battery_capacity_kwh:
    name: Jean-Luc battery capacity (kWh)
    min: 20
    max: 80
    step: 0.5
    initial: 40
    unit_of_measurement: "kWh"
    icon: mdi:battery

  # --- Phase 2: charging session helpers ---
  jean_luc_session_soc_start:
    name: Jean-Luc session SoC start
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "%"
  jean_luc_session_energy_start:
    name: Jean-Luc session energy start
    min: 0
    max: 200
    step: 0.01
    unit_of_measurement: "kWh"
  jean_luc_session_peak_kw:
    name: Jean-Luc session peak kW
    min: 0
    max: 350
    step: 0.1
    unit_of_measurement: "kW"

  # --- Phase 3: trip helpers ---
  jean_luc_trip_mileage_start:
    name: Jean-Luc trip mileage start
    min: 0
    max: 999999
    step: 0.1
    unit_of_measurement: "km"
  jean_luc_trip_soc_start:
    name: Jean-Luc trip SoC start
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "%"
  jean_luc_trip_energy_start:
    name: Jean-Luc trip energy start
    min: 0
    max: 200
    step: 0.01
    unit_of_measurement: "kWh"

# --- Derivative sensor: SoC rate of change ----------------------------------
# Powers the computed charging power. Smooths the quantised 1%-step SoC over
# a 15-min rolling window so the rate is stable enough to multiply against
# the battery capacity. unit_time: h gives the rate in %/hour.
sensor:
  - platform: derivative
    source: sensor.jean_luc_battery
    name: "Jean-Luc SoC rate"
    unit_time: h
    round: 2
    time_window: "00:15:00"

# --- Templates: degradation tracker + last-session summary sensors -----------
template:
  # Visited-dashboard support: numeric lat/lon for VictoriaMetrics ingest.
  # device_tracker.jean_luc_location's state is just "home"/"not_home" so the
  # InfluxDB integration won't ship coords on its own. We mirror them into
  # dedicated numeric sensors. Non-trigger templates re-evaluate immediately
  # at HA startup AND whenever the device_tracker's attributes change, so
  # the value is populated even when the car has been parked all day (the
  # earlier trigger-based version stayed 'unknown' after every restart
  # until the next GPS change). Availability gates the sensor while the
  # Renault API is still loading.
  - sensor:
    - name: "Jean-Luc latitude"
      unique_id: jean_luc_latitude
      unit_of_measurement: "°"
      state_class: measurement
      availability: "{{ state_attr('device_tracker.jean_luc_location', 'latitude') is not none }}"
      state: "{{ state_attr('device_tracker.jean_luc_location', 'latitude') | float }}"
    - name: "Jean-Luc longitude"
      unique_id: jean_luc_longitude
      unit_of_measurement: "°"
      state_class: measurement
      availability: "{{ state_attr('device_tracker.jean_luc_location', 'longitude') is not none }}"
      state: "{{ state_attr('device_tracker.jean_luc_location', 'longitude') | float }}"

  # Phase 1: degradation tracking.
  # Snapshot usable battery capacity AND estimated range whenever the pack
  # hits 100% SoC. Sparse by design — one point per full charge. The
  # capacity sensor depends on Renault's battery_available_energy, which is
  # 'unknown' for the Renault 5 E-Tech, so it usually stays empty. The
  # range_at_full sensor uses battery_autonomy (which the API does populate)
  # as a degradation proxy: as the pack ages, the same 100% SoC reports
  # fewer km of estimated range.
  - trigger:
      - platform: numeric_state
        entity_id: sensor.jean_luc_battery
        above: 99.5
    sensor:
      - name: "Jean-Luc capacity at full"
        unique_id: jean_luc_capacity_at_full
        unit_of_measurement: "kWh"
        device_class: energy_storage
        state_class: measurement
        state: "{{ states('sensor.jean_luc_battery_available_energy') | float(0) }}"
        attributes:
          mileage_km: "{{ states('sensor.jean_luc_mileage') | float(0) }}"
          recorded_at: "{{ now().isoformat() }}"
      - name: "Jean-Luc range at full"
        unique_id: jean_luc_range_at_full
        unit_of_measurement: "km"
        device_class: distance
        state_class: measurement
        state: "{{ states('sensor.jean_luc_battery_autonomy') | float(0) }}"
        attributes:
          mileage_km: "{{ states('sensor.jean_luc_mileage') | float(0) }}"
          recorded_at: "{{ now().isoformat() }}"

  # Computed charging power. Renault doesn't expose admissible_charging_power
  # for this car, so we derive instantaneous power from the SoC slope:
  #   power_kW = (dSoC/dt in %/h) / 100 × usable_capacity_kWh
  # The derivative sensor below smooths over 15 min, so quick noise from the
  # quantised integer SoC (1% steps) averages out. Zero when not charging.
  - sensor:
    - name: "Jean-Luc charging power computed"
      unique_id: jean_luc_charging_power_computed
      unit_of_measurement: "kW"
      device_class: power
      state_class: measurement
      availability: "{{ states('sensor.jean_luc_soc_rate') not in ['unknown', 'unavailable', 'none'] }}"
      state: >
        {% if is_state('binary_sensor.jean_luc_charging', 'on') %}
          {% set rate = states('sensor.jean_luc_soc_rate') | float(0) %}
          {% set cap = states('input_number.jean_luc_battery_capacity_kwh') | float(40) %}
          {{ ((rate / 100) * cap) | round(2) }}
        {% else %}
          0
        {% endif %}

  # Phase 2: last-charging-session summary.
  # Fires when charging stops (on -> off). Each sensor below becomes its own
  # VM metric, with one data point per session, so Grafana can plot session
  # history over time and aggregate (monthly kWh, peak distribution, etc.).
  - trigger:
      - platform: state
        entity_id: binary_sensor.jean_luc_charging
        from: "on"
        to: "off"
    sensor:
      - name: "Jean-Luc last session kWh added"
        unique_id: jean_luc_last_session_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: >-
          {% set start = states('input_number.jean_luc_session_energy_start') | float(0) %}
          {% set end = states('sensor.jean_luc_battery_available_energy') | float(0) %}
          {{ ((end - start) if (start > 0 and end > 0) else 0) | round(2) }}

      - name: "Jean-Luc last session duration"
        unique_id: jean_luc_last_session_duration_min
        unit_of_measurement: "min"
        device_class: duration
        state_class: measurement
        state: >-
          {% set ts = state_attr('input_datetime.jean_luc_session_started_at', 'timestamp') | float(0) %}
          {{ (((now().timestamp() - ts) / 60) if ts > 0 else 0) | round(0) }}

      - name: "Jean-Luc last session peak kW"
        unique_id: jean_luc_last_session_peak_kw
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        state: "{{ states('input_number.jean_luc_session_peak_kw') | float(0) }}"

      - name: "Jean-Luc last session SoC start"
        unique_id: jean_luc_last_session_soc_start
        unit_of_measurement: "%"
        state_class: measurement
        state: "{{ states('input_number.jean_luc_session_soc_start') | float(0) }}"

      - name: "Jean-Luc last session SoC end"
        unique_id: jean_luc_last_session_soc_end
        unit_of_measurement: "%"
        state_class: measurement
        state: "{{ states('sensor.jean_luc_battery') | float(0) }}"

  # Phase 3: last-trip summary.
  # Fires when input_boolean.jean_luc_trip_in_progress flips on -> off, which
  # the trip-end automations do (mileage stable for 20 min, or plug-in event).
  # Each sensor below becomes its own VM metric, one data point per trip.
  - trigger:
      - platform: state
        entity_id: input_boolean.jean_luc_trip_in_progress
        from: "on"
        to: "off"
    sensor:
      - name: "Jean-Luc last trip distance"
        unique_id: jean_luc_last_trip_distance
        unit_of_measurement: "km"
        device_class: distance
        state_class: measurement
        state: >-
          {% set start = states('input_number.jean_luc_trip_mileage_start') | float(0) %}
          {% set end = states('sensor.jean_luc_mileage') | float(0) %}
          {{ ((end - start) if (start > 0 and end >= start) else 0) | round(1) }}

      - name: "Jean-Luc last trip duration"
        unique_id: jean_luc_last_trip_duration_min
        unit_of_measurement: "min"
        device_class: duration
        state_class: measurement
        state: >-
          {% set ts = state_attr('input_datetime.jean_luc_trip_started_at', 'timestamp') | float(0) %}
          {{ (((now().timestamp() - ts) / 60) if ts > 0 else 0) | round(0) }}

      - name: "Jean-Luc last trip energy used"
        unique_id: jean_luc_last_trip_energy_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: >-
          {% set start = states('input_number.jean_luc_trip_energy_start') | float(-1) %}
          {% set end = states('sensor.jean_luc_battery_available_energy') | float(-1) %}
          {{ ((start - end) if (start > 0 and end >= 0 and start >= end) else 0) | round(2) }}

      - name: "Jean-Luc last trip SoC start"
        unique_id: jean_luc_last_trip_soc_start
        unit_of_measurement: "%"
        state_class: measurement
        state: "{{ states('input_number.jean_luc_trip_soc_start') | float(0) }}"

      - name: "Jean-Luc last trip SoC end"
        unique_id: jean_luc_last_trip_soc_end
        unit_of_measurement: "%"
        state_class: measurement
        state: "{{ states('sensor.jean_luc_battery') | float(0) }}"

      - name: "Jean-Luc last trip efficiency"
        unique_id: jean_luc_last_trip_efficiency
        unit_of_measurement: "kWh/100km"
        state_class: measurement
        state: >-
          {% set m_start = states('input_number.jean_luc_trip_mileage_start') | float(0) %}
          {% set m_end = states('sensor.jean_luc_mileage') | float(0) %}
          {% set e_start = states('input_number.jean_luc_trip_energy_start') | float(-1) %}
          {% set e_end = states('sensor.jean_luc_battery_available_energy') | float(-1) %}
          {% set distance = m_end - m_start %}
          {% set energy = e_start - e_end %}
          {% if distance > 0.1 and energy > 0 %}
            {{ (energy * 100 / distance) | round(2) }}
          {% else %}
            {{ 0 }}
          {% endif %}

# --- Phase 2 & 3 automations -------------------------------------------------
automation:
  # Plug-on: snapshot starting conditions into the helpers.
  - id: jean_luc_session_start
    alias: "Jean-Luc: charging session start"
    description: "Capture start time, SoC, and available energy when charging begins."
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.jean_luc_charging
        from: "off"
        to: "on"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.jean_luc_session_started_at
        data:
          timestamp: "{{ now().timestamp() }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.jean_luc_session_soc_start
        data:
          value: "{{ states('sensor.jean_luc_battery') | float(0) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.jean_luc_session_energy_start
        data:
          value: "{{ states('sensor.jean_luc_battery_available_energy') | float(0) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.jean_luc_session_peak_kw
        data:
          value: 0

  # During charging: maintain rolling max of admissible_charging_power.
  # Triggers on every reported value change; ignores updates outside a session.
  - id: jean_luc_session_track_peak
    alias: "Jean-Luc: track session peak charging power"
    description: "Rolling max of admissible charging power while a session is active."
    mode: queued
    max: 20
    trigger:
      - platform: state
        entity_id: sensor.jean_luc_admissible_charging_power
    condition:
      - condition: state
        entity_id: binary_sensor.jean_luc_charging
        state: "on"
      - condition: template
        value_template: >-
          {{ states('sensor.jean_luc_admissible_charging_power') | float(-1) >= 0 }}
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.jean_luc_session_peak_kw
        data:
          value: >-
            {{ [states('input_number.jean_luc_session_peak_kw') | float(0),
                states('sensor.jean_luc_admissible_charging_power') | float(0)] | max }}

  # Phase 3: trip lifecycle.
  # The Renault API only polls when the car wakes, so trip boundaries are
  # reconstructed from mileage deltas. Two stops <20 min apart count as one
  # trip in this v1.

  # Trip start: mileage ticks up while no trip is in progress.
  - id: jean_luc_trip_start
    alias: "Jean-Luc: trip start"
    description: "Snapshot start mileage, SoC, and energy when the odometer increases."
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.jean_luc_mileage
    condition:
      - condition: state
        entity_id: input_boolean.jean_luc_trip_in_progress
        state: "off"
      - condition: template
        value_template: >-
          {% set new = trigger.to_state.state | float(-1) %}
          {% set old = trigger.from_state.state | float(-1) %}
          {{ new > 0 and old > 0 and new > old }}
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.jean_luc_trip_started_at
        data:
          timestamp: "{{ now().timestamp() }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.jean_luc_trip_mileage_start
        data:
          value: "{{ trigger.from_state.state | float(0) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.jean_luc_trip_soc_start
        data:
          value: "{{ states('sensor.jean_luc_battery') | float(0) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.jean_luc_trip_energy_start
        data:
          value: "{{ states('sensor.jean_luc_battery_available_energy') | float(0) }}"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.jean_luc_trip_in_progress

  # Trip end: mileage hasn't changed for 20 min while a trip is active.
  # The state trigger with `for:` fires when the entity has been in its current
  # state for that duration — the entity doesn't need to update during the wait.
  - id: jean_luc_trip_end_stable
    alias: "Jean-Luc: trip end (mileage stable)"
    description: "Close the trip when the odometer hasn't changed for 20 minutes."
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.jean_luc_mileage
        for:
          minutes: 20
    condition:
      - condition: state
        entity_id: input_boolean.jean_luc_trip_in_progress
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.jean_luc_trip_in_progress

  # Trip end: car got plugged in. Conclusive — definitely arrived somewhere.
  - id: jean_luc_trip_end_plug
    alias: "Jean-Luc: trip end (plug-in)"
    description: "Close the trip when the car gets plugged in."
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.jean_luc_plug
        from: "off"
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.jean_luc_trip_in_progress
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.jean_luc_trip_in_progress
